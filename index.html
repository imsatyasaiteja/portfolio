<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">

    </head>

    
    <body>
               
        <header id="header">    
            
            <div class="nav-progress-bar" id="myBar"></div>

            <div class="page-padding"> 
                <div class="nav-container">
                    <a href="https://www.google.com">
                        <h2>
                            <img class="main-logo" src="images/logo_4.png" alt="main_logo" >
                        </h2>
                    </a>

                    <div class="nav-list nav-grid">
                        <a href="http://www.google.com" style="text-decoration: none">
                            <h2 class="font text-size-small logos">Work</h2>
                        </a>
                        <a href="http://www.google.com" style="text-decoration: none">
                            <h2 class="font text-size-small logos">Skills</h2>
                        </a>
                        <a href="http://www.google.com" style="text-decoration: none">
                            <h2 class="font text-size-small logos">Experience</h2>
                        </a>
                        <a href="http://www.google.com" style="text-decoration: none">
                            <h2 class="font text-size-small logos">About me</h2>
                        </a>
                        <a href="http://www.linkedin.com/in/imsatyasaiteja">
                            <h2>
                                <img src="images/linkedin_logo.png" alt="linkedin_logo" class="logo-size">
                            </h2>
                        </a>
                        <a href="https://twitter.com/imsatyasaiteja">
                            <h2>
                                <img src="images/twitter_logo.png" alt="twitter_logo" class="logo-size">
                            </h2>
                        </a>
                    </div>
                    
                    <div class="nav-button nav-grid">
                        <div class="toggle">
                            <span></span>
                            <span></span>
                            <span></span>
                        
                            <script>
                                let menutoggle = document.querySelector(".toggle");

                                menutoggle.onclick = function () 
                                {
                                    menutoggle.classList.toggle("active")
                                }

                                const navSlide = () => 
                                {
                                    const nav = document.querySelector(".nav-list");
                                    const navLinks = document.querySelectorAll(".nav-list a");

                                    menutoggle.addEventListener("click", () => {
                                        nav.classList.toggle("nav-active");

                                        navLinks.forEach((link, index) => {
                                            if (link.style.animation) {
                                                link.style.animation = "";
                                            }
                                            else {
                                                link.style.animation = 'navLinkFade 0.5s ease forwards ${index / 7 + 0.5}s';
                                            }
                                        });
                                    });    
                                };

                                navSlide();
                            </script>
                        </div>    
                    </div>
                </div>
            </div>

        </header>
               
        <main id="main">
            <section class="section_1">

                    <h1 class="font text-size-large">

                    </div>

            </section>
    
        </main>

        <footer id="footer">

</html>
